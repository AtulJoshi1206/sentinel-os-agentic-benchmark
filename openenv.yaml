spec_version: 1
name: sentinel_os
type: space
runtime: fastapi
app: server.app:app
port: 7860
version: "2.0.0"
description: >
  Production-grade agentic recovery benchmark with non-deterministic failure modes,
  noisy logs, wrong-fix traps, and multi-step dependency chains.
tags:
  - openenv
  - reliability
  - incident-response

tasks:
  - id: basic_recovery
    name: Basic Recovery
    difficulty: easy
    description: Apply the correct hidden-failure fix.
    max_steps: 15
    success_threshold: 0.95
    file: tasks/task_basic.py
    grader: tasks.task_basic:grader

  - id: log_diagnosis
    name: Log Diagnosis
    difficulty: medium
    description: Inspect logs before applying the correct fix.
    max_steps: 15
    success_threshold: 0.95
    file: tasks/task_logs.py
    grader: tasks.task_logs:grader

  - id: efficient_recovery
    name: Efficient Recovery
    difficulty: hard
    description: Recover with the minimum viable recovery path.
    max_steps: 15
    success_threshold: 0.30
    file: tasks/task_efficiency.py
    grader: tasks.task_efficiency:grader

endpoints:
  reset: POST /reset
  step: POST /step
  state: GET /state
  tasks: GET /tasks
  grader: GET /grader
  validate: GET /validate
